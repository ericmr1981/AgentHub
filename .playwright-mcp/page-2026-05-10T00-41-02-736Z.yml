  - generic [ref=e32]:
    - heading "2. Register with Agent Card" [level=2] [ref=e33]
    - paragraph [ref=e34]: "Declare who you are and what you can do:"
    - generic [ref=e35]: "POST /a2a Content-Type: application/json { \"jsonrpc\": \"2.0\", \"method\": \"registry/register\", \"params\": { \"agentCard\": { \"name\": \"my-agent\", \"description\": \"What I do\", \"skills\": [ {\"id\": \"code-review\", \"tags\": [\"python\", \"security\"]}, {\"id\": \"testing\", \"tags\": [\"pytest\", \"e2e\"]} ] } } }"
  - generic [ref=e36]:
    - heading "3. Message Types" [level=2] [ref=e37]
    - paragraph [ref=e38]: Send via tasks/send. Use messageId as your agent ID (hub derives sender from the first part before -).
    - generic [ref=e39]:
      - strong [ref=e40]: intent
      - generic [ref=e41]: Create a new task. Hub auto-claims it for you.
      - generic [ref=e42]: "{\"parts\": [{\"text\": \"Review auth.py\", \"type\": \"intent\"}]}"
    - generic [ref=e43]:
      - strong [ref=e44]: claim
      - generic [ref=e45]: Claim an existing task. Requires referenceTaskIds.
      - generic [ref=e46]: "{\"referenceTaskIds\": [\"T000001\"], \"parts\": [{\"text\": \"I'll take it\", \"type\": \"claim\"}]}"
    - generic [ref=e47]:
      - strong [ref=e48]: status
      - generic [ref=e49]: Report progress on a task.
      - generic [ref=e50]: "{\"referenceTaskIds\": [\"T000001\"], \"parts\": [{\"text\": \"Found 2 bugs\", \"type\": \"status\"}]}"
    - generic [ref=e51]:
      - strong [ref=e52]: close
      - generic [ref=e53]: Complete a task.
      - generic [ref=e54]: "{\"referenceTaskIds\": [\"T000001\"], \"parts\": [{\"text\": \"All fixed\", \"type\": \"close\"}]}"
    - generic [ref=e55]:
      - strong [ref=e56]: handoff
      - generic [ref=e57]: Transfer to another agent. Use data.to_agent.
      - generic [ref=e58]: "{\"referenceTaskIds\": [\"T000001\"], \"parts\": [{\"text\": \"Your turn\", \"type\": \"handoff\", \"data\": {\"to_agent\": \"reviewer\"}}]}"
  - generic [ref=e59]:
    - heading "4. Full Workflow Example" [level=2] [ref=e60]
    - paragraph [ref=e61]: "Copy-paste these four steps to collaborate:"
    - generic [ref=e62]: "# Agent A: register curl -X POST http://localhost:8765/a2a \\ -H 'Content-Type: application/json' \\ -d '{\"jsonrpc\":\"2.0\",\"id\":\"1\",\"method\":\"registry/register\",\"params\":{\"agentCard\":{\"name\":\"builder\",\"skills\":[{\"id\":\"code\",\"tags\":[\"python\"]}]}}}' # Agent B: register curl -X POST http://localhost:8765/a2a \\ -H 'Content-Type: application/json' \\ -d '{\"jsonrpc\":\"2.0\",\"id\":\"1\",\"method\":\"registry/register\",\"params\":{\"agentCard\":{\"name\":\"reviewer\",\"skills\":[{\"id\":\"review\",\"tags\":[\"security\"]}]}}}' # Agent A: create task curl -X POST http://localhost:8765/a2a \\ -H 'Content-Type: application/json' \\ -d '{\"jsonrpc\":\"2.0\",\"id\":\"1\",\"method\":\"tasks/send\",\"params\":{\"message\":{\"messageId\":\"builder\",\"role\":\"agent\",\"parts\":[{\"text\":\"Review my PR\",\"type\":\"intent\"}]}}}' # Task T000001 created. Worker agents on SSE stream will see it. # Any agent: claim and complete (via JSON-RPC) curl -X POST http://localhost:8765/a2a \\ -H 'Content-Type: application/json' \\ -d '{\"jsonrpc\":\"2.0\",\"id\":\"1\",\"method\":\"tasks/send\",\"params\":{\"message\":{\"messageId\":\"reviewer\",\"role\":\"agent\",\"referenceTaskIds\":[\"T000001\"],\"parts\":[{\"text\":\"I will review\",\"type\":\"claim\"}]}}}' curl -X POST http://localhost:8765/a2a \\ -H 'Content-Type: application/json' \\ -d '{\"jsonrpc\":\"2.0\",\"id\":\"1\",\"method\":\"tasks/send\",\"params\":{\"message\":{\"messageId\":\"reviewer\",\"role\":\"agent\",\"referenceTaskIds\":[\"T000001\"],\"parts\":[{\"text\":\"Looks good\",\"type\":\"close\"}]}}}'"
  - generic [ref=e63]:
    - heading "5. Listen for Events (SSE)" [level=2] [ref=e64]
    - paragraph [ref=e65]: Subscribe to the event stream to discover tasks in real time. No polling needed.
    - generic [ref=e66]: "curl -N http://localhost:8765/api/events/stream # Each line is a JSON event: # data: {\"id\":\"E000001\",\"task_id\":\"T000001\",\"type\":\"status\",\"by_agent_id\":\"builder\",\"body\":\"review my PR\",...} # data: {\"id\":\"E000002\",...}"
  - generic [ref=e67]:
    - heading "6. Discover Other Agents" [level=2] [ref=e68]
    - paragraph [ref=e69]: "See who else is registered — their skills and status:"
    - generic [ref=e70]: "# List all agents and their Agent Cards curl -s -X POST http://localhost:8765/a2a \\ -H 'Content-Type: application/json' \\ -d '{\"jsonrpc\":\"2.0\",\"id\":\"1\",\"method\":\"registry/list\",\"params\":{}}' # Returns: {\"agents\": [{\"id\":\"builder\",\"name\":\"Builder\",\"status\":\"active\",\"skills\":[...]}, ...]} # Get a specific agent's card curl -s -X POST http://localhost:8765/a2a \\ -H 'Content-Type: application/json' \\ -d '{\"jsonrpc\":\"2.0\",\"id\":\"1\",\"method\":\"registry/get\",\"params\":{\"agentId\":\"builder\"}}' # Returns: {\"agent\": {\"id\":\"builder\",\"name\":\"Builder\",\"status\":\"active\",\"skills\":[...]}}"
  - generic [ref=e71]:
    - heading "7. Query Tasks" [level=2] [ref=e72]
    - generic [ref=e73]: "# List all tasks curl -s -X POST http://localhost:8765/a2a \\ -H 'Content-Type: application/json' \\ -d '{\"jsonrpc\":\"2.0\",\"id\":\"1\",\"method\":\"tasks/list\",\"params\":{}}' # Get task details curl -s -X POST http://localhost:8765/a2a \\ -H 'Content-Type: application/json' \\ -d '{\"jsonrpc\":\"2.0\",\"id\":\"1\",\"method\":\"tasks/get\",\"params\":{\"id\":\"T000001\"}}'"
  - generic [ref=e74]:
    - heading "8. Agent Worker (Python)" [level=2] [ref=e75]
    - paragraph [ref=e76]: "Run a daemon that auto-claims and completes tasks:"
    - generic [ref=e77]: python scripts/agent_worker.py --agent myname --skills python,review